<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="calculator">
            <input type="text" id="display" readonly>
            <div>
            <button>⌫</button>
            <button>c</button>
            <button>%</button>
            <button>x²</button>
            </div>
            <div>
            <button>√</button>
            <button>(</button>
            <button>)</button>
            <button>^</button>
            </div>
            <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>
            </div>
            <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
            </div>
            <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
            </div>
            <div>
            <button>.</button>
            <button>0</button>
            <button>/</button>
            <button>=</button>
            </div>
            <div class="history">  
                <button style="width: auto;" id="clearHistory">clearHistory</button>
                <h3>history: </h3>
                <ul id="historyList"></ul>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
